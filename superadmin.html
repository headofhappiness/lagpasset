<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superadmin – Lagpasset</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf8f4; --surface:#fff; --border:#c4d8c4;
  --green:#1a8c3a; --green-mid:#22a847; --green-light:#e8f7ec;
  --dark:#111c13; --text:#1e2e20; --muted:#4a6a4e; --red:#c0392b; --amber:#e8a020;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Outfit",sans-serif;min-height:100vh}
.nav{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.4rem;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:0;z-index:10}
.nav-logo{font-family:"Nunito",sans-serif;font-size:1.15rem;color:var(--dark);font-weight:800}
.nav-logo span{color:var(--green)}
.nav-right{display:flex;align-items:center;gap:.85rem;font-size:13px;color:var(--muted)}
.badge-sa{background:#111c13;color:#fff;border-radius:100px;padding:3px 11px;font-size:11px;font-weight:700;letter-spacing:.03em}
.linkbtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;font-family:"Outfit",sans-serif;text-decoration:underline}
.page{max-width:920px;margin:0 auto;padding:2rem 1.5rem 5rem}
h1{font-family:"Nunito",sans-serif;font-size:1.8rem;color:var(--dark);font-weight:900}
.green-line{width:46px;height:4px;background:var(--green);border-radius:3px;margin:.55rem 0 .4rem}
.lead{font-size:14.5px;color:var(--muted);margin-bottom:1.75rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.4rem 1.5rem;margin-bottom:1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.card-title{font-family:"Nunito",sans-serif;font-size:1.15rem;font-weight:800;color:var(--dark);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
@media(max-width:560px){.grid2{grid-template-columns:1fr}}

/* ── Inputs: hindrar iOS-zoom ── */
input,select,textarea{font-size:16px !important}

/* ── Mobil ── */
@media(max-width:600px){
  .page{padding:1.25rem 1rem 3rem}
  h1{font-size:1.45rem}
  .nav{padding:.7rem 1rem}
  .card{padding:1rem 1.1rem}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
}
label{display:block;font-size:13px;font-weight:600;color:var(--dark);margin-bottom:.35rem}
input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:.7rem .85rem;font-family:"Outfit",sans-serif;font-size:15px;color:var(--text)}
input:focus{outline:none;border-color:var(--green)}
.btn{border:none;border-radius:10px;padding:.75rem 1.3rem;font-family:"Outfit",sans-serif;font-size:14px;font-weight:700;cursor:pointer;background:var(--green);color:#fff;transition:background .15s}
.btn:hover{background:var(--green-mid)}
.btn:disabled{opacity:.6;cursor:default}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:.6rem .5rem;border-bottom:1.5px solid var(--border)}
td{padding:.7rem .5rem;border-bottom:1px solid var(--border);font-size:14px;vertical-align:top}
.pill{display:inline-block;border-radius:100px;padding:2px 10px;font-size:11.5px;font-weight:700}
.pill-ok{background:var(--green-light);color:var(--green)}
.pill-wait{background:#fff3e0;color:#b07000}
.msg{border-radius:10px;padding:.8rem .9rem;font-size:13.5px;margin-top:1rem}
.msg.ok{background:var(--green-light);color:var(--green)}
.msg.err{background:#fdecea;color:var(--red)}
.loading{text-align:center;padding:3rem;color:var(--muted)}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none}
.muted{color:var(--muted);font-size:12.5px}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-logo"><img src="logo.png" alt="Lagpasset" style="height:24px;vertical-align:middle"> <span class="badge-sa">SUPERADMIN</span></div>
  <div class="nav-right"><span id="whoami"></span><button class="linkbtn" onclick="logout()">Logga ut</button></div>
</div>

<div id="gate" class="loading"><span class="spinner"></span> Kontrollerar behörighet...</div>

<div id="page" class="page hidden">
  <h1>Föreningar</h1>
  <div class="green-line"></div>
  <p class="lead">Lägg upp nya kundföreningar. När du sparat en förening kan deras admin logga in på <strong>login.html</strong> med e-postadressen nedan – kontot kopplas automatiskt till föreningen vid första inloggningen.</p>

  <div class="card">
    <div class="card-title">➕ Ny förening</div>
    <div class="grid2">
      <div><label>Föreningens namn</label><input id="cName" placeholder="Ex. Åsa IF"></div>
      <div><label>Kontaktperson (admin)</label><input id="cContact" placeholder="Ex. Lisa Andersson"></div>
      <div><label>Admin-e-post (inloggning)</label><input id="cEmail" type="email" placeholder="namn@asaif.se"></div>
      <div><label>Telefon</label><input id="cPhone" placeholder="070-123 45 67"></div>
    </div>
    <div style="margin-top:1.1rem"><button class="btn" id="addBtn" onclick="addClub()">Spara förening</button></div>
    <div id="addMsg" class="msg" style="display:none"></div>
  </div>

  <div class="card">
    <div class="card-title">🏟️ Alla föreningar</div>
    <div class="table-wrap"><div id="clubTableWrap"><div class="muted">Laddar...</div></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://acqwpmigracdzkjrddwk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjcXdwbWlncmFjZHpranJkZHdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4OTc1MTUsImV4cCI6MjA5NjQ3MzUxNX0.xx4t5mUkHNJanGdhy7HKSdolkYZKP6cCHQM72ktmrac';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let events = [];

async function logout(){ await sb.auth.signOut(); location.href = 'login.html'; }

async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session || !session.user){ location.href = 'login.html'; return; }
  const { data, error } = await sb.from('club_users').select('role').eq('user_id', session.user.id).maybeSingle();
  if(error || !data || data.role !== 'superadmin'){
    // Inte superadmin → tillbaka till login
    location.href = 'login.html';
    return;
  }
  document.getElementById('whoami').textContent = session.user.email;
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('page').classList.remove('hidden');
  await loadClubs();
}

async function loadClubs(){
  const wrap = document.getElementById('clubTableWrap');
  try {
    const [{ data:clubs }, { data:evs }, { data:links }] = await Promise.all([
      sb.from('clubs').select('*').order('name'),
      sb.from('events').select('id, club_id, name'),
      sb.from('club_users').select('club_id, role')
    ]);
    events = evs || [];
    if(!clubs || !clubs.length){ wrap.innerHTML = '<div class="muted">Inga föreningar än. Lägg till din första ovan.</div>'; return; }
    const linkedClubIds = new Set((links||[]).map(l => l.club_id).filter(Boolean));
    wrap.innerHTML = '<table><thead><tr><th>Förening</th><th>Admin-inloggning</th><th>Event</th><th>Status</th><th></th></tr></thead><tbody>' +
      clubs.map(c => {
        const evCount = events.filter(e => e.club_id === c.id).length;
        const hasLoggedIn = linkedClubIds.has(c.id);
        return '<tr>' +
          '<td><strong>' + (c.name || '(namnlös)') + '</strong>' + (c.contact_name ? '<br><span class="muted">' + c.contact_name + '</span>' : '') + '</td>' +
          '<td>' + (c.contact_email || '<span class="muted">–</span>') + (c.contact_phone ? '<br><span class="muted">' + c.contact_phone + '</span>' : '') + '</td>' +
          '<td>' + evCount + ' st</td>' +
          '<td>' + (hasLoggedIn ? '<span class="pill pill-ok">Aktiv</span>' : '<span class="pill pill-wait">Inväntar inloggning</span>') + '</td>' +
          '<td><button onclick="deleteClub(\''+c.id+'\',\''+c.name+'\',\'' + (linkedClubIds.has(c.id) ? [...(links||[]).filter(l=>l.club_id===c.id).map(l=>l.user_id)][0]||'' : '') + '\')" style="background:none;border:1px solid #e8c0c0;color:#c0392b;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit">Radera</button></td>' +
          '</tr>';
      }).join('') + '</tbody></table>';
  } catch(e){
    wrap.innerHTML = '<div class="msg err">Kunde inte ladda föreningar: ' + (e.message||'') + '</div>';
  }
}

async function deleteClub(clubId, clubName, userId){
  if(!confirm('Radera "' + clubName + '"? Admin-kontot och kopplingen tas bort. Eventdata behålls.')) return;
  try {
    if(userId){
      const { data, error } = await sb.functions.invoke('delete-admin-user', {
        body: { userId, clubId, deleteClub: true }
      });
      if(error) throw error;
      if(data && data.error) throw new Error(data.error);
    } else {
      // Ingen inloggad admin ännu – radera bara föreningen
      await sb.from('clubs').delete().eq('id', clubId);
    }
    await loadClubs();
    const msg = document.getElementById('addMsg');
    msg.className = 'msg ok'; msg.style.display = 'block';
    msg.textContent = '✓ ' + clubName + ' är raderad.';
    setTimeout(() => msg.style.display = 'none', 4000);
  } catch(e){
    alert('Kunde inte radera: ' + (e.message || 'okänt fel'));
  }
}

async function addClub(){
  const name = document.getElementById('cName').value.trim();
  const contact = document.getElementById('cContact').value.trim();
  const email = document.getElementById('cEmail').value.trim();
  const phone = document.getElementById('cPhone').value.trim();
  const msg = document.getElementById('addMsg');
  if(!name || !email){ msg.className='msg err'; msg.style.display='block'; msg.textContent='Fyll i minst föreningsnamn och admin-e-post.'; return; }
  const btn = document.getElementById('addBtn'); btn.disabled = true; btn.textContent = 'Sparar...';
  try {
    const { data, error } = await sb.functions.invoke('create-admin-user', {
      body: { clubName: name, contactName: contact || null, email: email, phone: phone || null }
    });
    if(error) throw error;
    if(data && data.error) throw new Error(data.error);
    msg.className='msg ok'; msg.style.display='block';
    msg.innerHTML = '✓ <strong>' + name + '</strong> tillagd. Välkomstmejl skickat till <strong>' + email + '</strong>.';
    document.getElementById('cName').value=''; document.getElementById('cContact').value=''; document.getElementById('cEmail').value=''; document.getElementById('cPhone').value='';
    await loadClubs();
    // Skicka välkomstmejl (tyst – blockerar inte om det misslyckas)
    try {
      await sb.functions.invoke('send-welcome', {
        body: { adminName: contact || null, clubName: name, email: email }
      });
    } catch(e){ console.warn('Välkomstmejl kunde inte skickas:', e); }
  } catch(e){
    msg.className='msg err'; msg.style.display='block'; msg.textContent='Kunde inte spara: ' + (e.message||'okänt fel');
  }
  btn.disabled = false; btn.textContent = 'Spara förening';
}

init();
</script>
</body>
</html>
