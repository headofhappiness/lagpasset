<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logga in – Lagpasset</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf8f4; --surface:#fff; --border:#c4d8c4;
  --green:#1a8c3a; --green-mid:#22a847; --green-light:#e8f7ec;
  --dark:#111c13; --text:#1e2e20; --muted:#4a6a4e; --red:#c0392b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Outfit",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:2.25rem 2rem;max-width:420px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,.05);text-align:center}
.sub{font-size:14px;color:var(--muted);margin-bottom:1.5rem}
h1{font-family:"Nunito",sans-serif;font-size:1.35rem;color:var(--dark);font-weight:800;margin-bottom:.4rem}
.green-line{width:46px;height:4px;background:var(--green);border-radius:3px;margin:.5rem auto 1.1rem}
label{display:block;text-align:left;font-size:13px;font-weight:600;color:var(--dark);margin-bottom:.4rem;margin-top:.85rem}
input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:.8rem .9rem;font-family:"Outfit",sans-serif;font-size:16px;color:var(--text)}
input:focus{outline:none;border-color:var(--green)}
.btn{width:100%;border:none;border-radius:10px;padding:.85rem;font-family:"Outfit",sans-serif;font-size:15px;font-weight:700;cursor:pointer;background:var(--green);color:#fff;margin-top:1.25rem;transition:background .15s}
.btn:hover{background:var(--green-mid)}
.btn:disabled{opacity:.6;cursor:default}
.msg{border-radius:10px;padding:.8rem .9rem;font-size:13.5px;margin-top:1rem;text-align:left}
.msg.ok{background:var(--green-light);color:var(--green)}
.msg.err{background:#fdecea;color:var(--red)}
.msg.info{background:#eef4ff;color:#1d4ed8}
.foot{font-size:12.5px;color:var(--muted);margin-top:1.5rem}
.foot a{color:var(--green);text-decoration:none}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none}
.forgot{font-size:12.5px;color:var(--muted);margin-top:.75rem;text-align:right}
.forgot a{color:var(--green);text-decoration:none;cursor:pointer}
@media(max-width:480px){
  .box{padding:1.5rem 1.25rem}
  h1{font-size:1.3rem}
}
</style>
</head>
<body>
<div class="box">
  <a href="https://lagpasset.se" style="display:block;text-decoration:none"><img src="logo.png" alt="Lagpasset" style="height:32px;display:block;margin:0 auto .3rem"></a>
  <div class="sub">För föreningar</div>

  <div id="checking">
    <div class="msg info"><span class="spinner"></span> Kontrollerar inloggning...</div>
  </div>

  <div id="loginForm" class="hidden">
    <h1>Logga in</h1>
    <div class="green-line"></div>
    <label for="email">E-postadress</label>
    <input type="email" id="email" placeholder="namn@forening.se" autocomplete="email">
    <label for="password">Lösenord</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()">
    <button class="btn" id="loginBtn" onclick="login()">Logga in</button>
    <div id="msg" class="msg" style="display:none"></div>
    <div class="forgot"><a onclick="forgotPassword()">Glömt lösenordet?</a></div>
    <div style="margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border);text-align:center">
      <div style="font-size:13px;color:var(--muted);margin-bottom:.75rem">Inte kund ännu?</div>
      <a href="https://cal.com/lisa-jonsson-lbe4ex/mote-med-lisa-pa-lagpasset-20-min" target="_blank" style="display:block;background:var(--green);color:#fff;text-decoration:none;padding:11px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:14.5px;font-weight:700;margin-bottom:.5rem">📅 Boka en demo (20 min)</a>
      <a href="bli-kund.html" style="font-size:12.5px;color:var(--muted);text-decoration:none">eller bli kund direkt →</a>
    </div>
  </div>

  <div id="forgotForm" class="hidden">
    <h1>Glömt lösenord?</h1>
    <div class="green-line"></div>
    <p style="font-size:13.5px;color:var(--muted);margin-bottom:1rem;text-align:left">Ange din e-postadress så skickar vi en länk för att välja nytt lösenord.</p>
    <label for="resetEmail">E-postadress</label>
    <input type="email" id="resetEmail" placeholder="namn@forening.se" autocomplete="email" onkeydown="if(event.key==='Enter') sendReset()">
    <button class="btn" id="resetSendBtn" onclick="sendReset()">Skicka återställningslänk</button>
    <div id="forgotMsg" class="msg" style="display:none"></div>
    <div class="forgot" style="margin-top:.75rem;text-align:center"><a onclick="showLogin()">← Tillbaka till inloggning</a></div>
  </div>

  <div id="resetForm" class="hidden">
    <h1>Välj nytt lösenord</h1>
    <div class="green-line"></div>
    <label for="newPassword">Nytt lösenord</label>
    <input type="password" id="newPassword" placeholder="Minst 8 tecken" autocomplete="new-password">
    <label for="newPassword2">Bekräfta lösenord</label>
    <input type="password" id="newPassword2" placeholder="Upprepa lösenordet" autocomplete="new-password" onkeydown="if(event.key==='Enter') updatePassword()">
    <button class="btn" id="resetBtn" onclick="updatePassword()">Spara nytt lösenord</button>
    <div id="resetMsg" class="msg" style="display:none"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://acqwpmigracdzkjrddwk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjcXdwbWlncmFjZHpranJkZHdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4OTc1MTUsImV4cCI6MjA5NjQ3MzUxNX0.xx4t5mUkHNJanGdhy7HKSdolkYZKP6cCHQM72ktmrac';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function show(id){
  ['checking','loginForm','forgotForm','resetForm'].forEach(s=>{
    const el = document.getElementById(s);
    if(el) el.classList.add('hidden');
  });
  const el = document.getElementById(id);
  if(el) el.classList.remove('hidden');
}
function setMsg(text, type){ const m=document.getElementById('msg'); m.className='msg '+(type||'info'); m.style.display='block'; m.innerHTML=text; }
function showLogin(){ show('loginForm'); }

async function routeUser(user){
  try {
    let { data, error } = await sb.from('club_users').select('club_id, role').eq('user_id', user.id).maybeSingle();
    if(error) throw error;
    if(!data){
      const { data:club } = await sb.from('clubs').select('id').eq('contact_email', user.email).maybeSingle();
      if(club){
        await sb.from('club_users').insert({ user_id: user.id, club_id: club.id, role: 'admin' });
        data = { club_id: club.id, role: 'admin' };
      }
    }
    if(!data){
      show('loginForm');
      setMsg('E-posten är inte kopplad till någon förening. Kontakta Lagpasset.', 'err');
      await sb.auth.signOut();
      return;
    }
    if(data.role === 'superadmin'){
      window.location.href = 'superadmin.html';
    } else {
      // Hämta senaste eventet för föreningen
      const { data: events } = await sb.from('events').select('id').eq('club_id', data.club_id).order('date_start', { ascending: false }).limit(1);
      if(events && events.length > 0){
        window.location.href = 'admin.html?event=' + events[0].id;
      } else {
        window.location.href = 'admin.html';
      }
    }
  } catch(e){
    console.error(e);
    show('loginForm');
    setMsg('Något gick fel. Försök igen.', 'err');
  }
}

async function login(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email || !password){ setMsg('Fyll i e-post och lösenord.', 'err'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Loggar in...';
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if(error) throw error;
    await routeUser(data.user);
  } catch(e){
    setMsg('Fel e-post eller lösenord. Försök igen.', 'err');
    btn.disabled = false; btn.textContent = 'Logga in';
  }
}

function forgotPassword(){
  show('forgotForm');
  document.getElementById('forgotMsg').style.display='none';
  document.getElementById('resetEmail').value='';
}

async function sendReset(){
  const email = document.getElementById('resetEmail').value.trim();
  const msg = document.getElementById('forgotMsg');
  const btn = document.getElementById('resetSendBtn');
  if(!email){ msg.className='msg err'; msg.style.display='block'; msg.textContent='Fyll i din e-postadress.'; return; }
  btn.disabled = true; btn.textContent = 'Skickar...';
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: 'https://lagpasset.se/login.html' });
  if(error){
    msg.className='msg err'; msg.style.display='block'; msg.textContent='Något gick fel: ' + error.message;
    btn.disabled = false; btn.textContent = 'Skicka återställningslänk';
  } else {
    msg.className='msg ok'; msg.style.display='block'; msg.textContent='✓ Kolla inkorgen! Om e-posten finns i systemet har vi skickat en länk.';
    btn.disabled = true;
  }
}

async function updatePassword(){
  const p1 = document.getElementById('newPassword').value;
  const p2 = document.getElementById('newPassword2').value;
  const msg = document.getElementById('resetMsg');
  if(p1.length < 8){ msg.className='msg err'; msg.style.display='block'; msg.textContent='Lösenordet måste vara minst 8 tecken.'; return; }
  if(p1 !== p2){ msg.className='msg err'; msg.style.display='block'; msg.textContent='Lösenorden matchar inte.'; return; }
  const btn = document.getElementById('resetBtn');
  btn.disabled = true; btn.textContent = 'Sparar...';
  const { error } = await sb.auth.updateUser({ password: p1 });
  if(error){
    msg.className='msg err'; msg.style.display='block'; msg.textContent='Kunde inte uppdatera lösenordet: ' + error.message;
    btn.disabled = false; btn.textContent = 'Spara nytt lösenord';
  } else {
    msg.className='msg ok'; msg.style.display='block'; msg.textContent='✓ Lösenordet är uppdaterat! Du loggas in...';
    setTimeout(async () => {
      const { data: { session } } = await sb.auth.getSession();
      if(session) await routeUser(session.user);
      else show('loginForm');
    }, 1500);
  }
}

// Kolla URL:en DIREKT — innan Supabase hinner göra något
// Supabase skickar SIGNED_IN innan PASSWORD_RECOVERY, så vi måste
// fånga recovery-länken via hash redan här
// Hantera ?logout=1 — logga ut och visa loginformuläret direkt
if(new URLSearchParams(window.location.search).get('logout') === '1'){
  sb.auth.signOut().then(() => show('loginForm'));
} else {

const hashParams = new URLSearchParams(window.location.hash.slice(1));
const isRecoveryLink = hashParams.get('type') === 'recovery';

if(isRecoveryLink){
  // Visa resetForm direkt, innan auth-events triggas
  show('resetForm');
}

sb.auth.onAuthStateChange(async (event, session) => {
  if(event === 'PASSWORD_RECOVERY'){
    show('resetForm');
  } else if(event === 'SIGNED_IN' && !isRecoveryLink){
    if(session) await routeUser(session.user);
  }
});

// Kolla om redan inloggad (bara vid vanlig sidladdning)
if(!isRecoveryLink){
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if(session){
      await routeUser(session.user);
    } else {
      show('loginForm');
    }
  })();
}
} // end logout else
</script>
</body>
</html>
