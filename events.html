<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>Mina arrangemang – Lagpasset</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f7f4;--surface:#fff;--border:#dde8dd;
  --green:#1a8c3a;--green-light:#e8f7ec;--green-pale:rgba(26,140,58,.06);
  --dark:#111c13;--text:#1e2e20;--muted:#6a8a6e;
  --red:#c0392b;--amber:#e8a020;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Outfit",sans-serif;font-size:15px;min-height:100vh}
.topbar{background:#060e07;padding:.85rem 1.5rem;display:flex;align-items:center;gap:.65rem}
.topbar img{height:24px;width:auto}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:1rem}
.topbar .club{font-size:13px;color:rgba(200,240,200,.75);font-weight:500}
.topbar a{font-size:13px;color:rgba(230,255,230,.7);text-decoration:none}
.topbar a:hover{color:#fff}
.wrap{max-width:920px;margin:0 auto;padding:2rem 1.5rem 4rem}

/* Page header */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.75rem;flex-wrap:wrap}
.page-header h1{font-family:"Nunito",sans-serif;font-size:1.75rem;font-weight:800;color:var(--dark)}
.page-header .sub{color:var(--muted);margin-top:.25rem;font-size:14.5px}
.btn-new{background:var(--green);color:#fff;border:none;border-radius:100px;padding:10px 22px;font-family:"Outfit",sans-serif;font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation;white-space:nowrap}
.btn-new:hover{background:#15752e}

/* Sections row */
.sections-box{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:1rem 1.25rem;margin-bottom:1.75rem}
.sections-label{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem}
.sections-manage{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center;margin-bottom:.6rem;min-height:28px}
.sec-pill{display:inline-flex;align-items:center;gap:.3rem;background:var(--green-light);color:var(--green);border-radius:100px;padding:4px 12px;font-size:13px;font-weight:600}
.sec-pill button{background:none;border:none;cursor:pointer;color:var(--green);font-size:14px;line-height:1;padding:0;opacity:.7}
.sec-pill button:hover{opacity:1}
.sections-add{display:flex;gap:.5rem;align-items:center;margin-top:.5rem}
.sections-add input{flex:1;max-width:220px;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px}
.sections-add button{background:var(--green);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;touch-action:manipulation}

/* Filter row */
.filter-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.25rem}
.sf-btn{border:1.5px solid var(--border);background:#fff;border-radius:100px;padding:5px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:"Outfit",sans-serif;transition:all .15s;touch-action:manipulation}
.sf-btn:hover{border-color:var(--green);color:var(--green)}
.sf-btn.active{background:var(--green);color:#fff;border-color:var(--green)}

/* Event grid */
.event-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem}
.event-card-wrap{position:relative}
.event-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:1.25rem;cursor:pointer;transition:all .15s;text-decoration:none;color:inherit;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}
.event-card:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,140,58,.1)}
.event-card .tag{align-self:flex-start;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;background:var(--green-light);color:var(--green);margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.03em}
.event-card h3{font-size:17px;font-weight:700;color:var(--dark);margin-bottom:.35rem}
.event-card .date{font-size:13.5px;color:var(--muted)}
.event-card .stats{margin-top:1rem;padding-top:.85rem;border-top:1px solid var(--border);display:flex;gap:1.25rem;font-size:13px;color:var(--muted)}
.event-card .stats strong{color:var(--dark);font-weight:700}
.edit-event-btn{position:absolute;top:.75rem;right:.75rem;background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--muted);font-family:inherit;z-index:1;touch-action:manipulation}
.loading{color:var(--muted);font-style:italic;padding:2rem 0}
.empty-msg{color:var(--muted);font-size:15px;padding:2rem 0}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(17,28,19,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;max-width:440px;width:100%;padding:1.5rem}
.modal-title{font-family:"Nunito",sans-serif;font-size:1.2rem;font-weight:800;color:var(--dark);margin-bottom:1.25rem}
.form-group{margin-bottom:1rem}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:.35rem}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px}
.inline-2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.btn{padding:10px 18px;border-radius:100px;font-family:inherit;font-size:14px;font-weight:600;border:none;cursor:pointer}
.btn-primary{background:var(--green);color:#fff}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.modal-footer{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.25rem}
input,select,textarea{font-size:16px !important}

@media(max-width:600px){
  .wrap{padding:1.25rem 1rem 3rem}
  .page-header h1{font-size:1.4rem}
  .topbar{padding:.7rem 1rem}
  .topbar .club{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .event-grid{grid-template-columns:1fr}
  .modal-overlay{align-items:flex-end;padding:0}
  .modal{border-radius:18px 18px 0 0;max-width:100%;padding:1.5rem 1.25rem 2rem;max-height:90vh;overflow-y:auto}
  .inline-2{grid-template-columns:1fr}
  .modal-footer{flex-direction:column-reverse}
  .modal-footer .btn{width:100%;text-align:center;border-radius:10px}
  .sections-add input{max-width:100%}
}
</style>
</head>
<body>
<div class="topbar">
  <a href="events.html" style="display:inline-flex;align-items:center"><img src="logo-white.png" alt="Lagpasset"></a>
  <div class="right">
    <span class="club" id="clubName"></span>
    <a href="#" onclick="signOut();return false;">Logga ut</a>
  </div>
</div>

<div class="wrap">
  <!-- Sidhuvud -->
  <div class="page-header">
    <div>
      <h1>Mina arrangemang</h1>
      <p class="sub">Välj ett arrangemang för att hantera pass och bemanning.</p>
    </div>
    <button class="btn-new" onclick="openNew()">+ Nytt arrangemang</button>
  </div>

  <!-- Sektionsruta — alltid synlig -->
  <div class="sections-box">
    <div class="sections-label">Föreningens sektioner</div>
    <div class="sections-manage" id="sectionPills">
      <span style="font-size:13px;color:var(--muted);font-style:italic">Laddar...</span>
    </div>
    <div class="sections-add">
      <input type="text" id="sectionInput" placeholder="Lägg till sektion..." onkeydown="if(event.key==='Enter'){event.preventDefault();addSection();}">
      <button onclick="addSection()">Lägg till</button>
    </div>
  </div>

  <!-- Filterrad — visas bara om det finns events och 2+ sektioner -->
  <div class="filter-row" id="filterRow" style="display:none"></div>

  <!-- Eventlista -->
  <div id="eventList">
    <div class="loading">Laddar arrangemang…</div>
  </div>
</div>

<!-- Nytt arrangemang-modal -->
<div class="modal-overlay" id="modalNew">
  <div class="modal">
    <div class="modal-title">Nytt arrangemang</div>
    <div class="form-group">
      <label class="form-label">Namn</label>
      <input type="text" id="newName" placeholder="Ex. Åsacupen 2026">
    </div>
    <div class="form-group">
      <label class="form-label">Sektion</label>
      <input id="newSection" list="sectionSuggestions" placeholder="Ex. Fotboll" autocomplete="off">
      <datalist id="sectionSuggestions"></datalist>
    </div>
    <div class="inline-2">
      <div class="form-group">
        <label class="form-label">Första dag</label>
        <input type="date" id="newStart">
      </div>
      <div class="form-group">
        <label class="form-label">Sista dag</label>
        <input type="date" id="newEnd">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeNew()" style="touch-action:manipulation">Avbryt</button>
      <button class="btn btn-primary" id="createBtn" onclick="submitNewEvent()" style="touch-action:manipulation">Skapa →</button>
    </div>
    <div id="createMsg" style="display:none;font-size:13px;padding:.5rem .75rem;border-radius:8px;margin-top:.5rem;background:#fdecea;color:#c0392b"></div>
  </div>
</div>

<!-- Redigera arrangemang-modal -->
<div class="modal-overlay" id="modalEdit">
  <div class="modal">
    <div class="modal-title">Redigera arrangemang</div>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label class="form-label">Namn</label>
      <input type="text" id="editName">
    </div>
    <div class="form-group">
      <label class="form-label">Sektion</label>
      <input id="editSection" list="sectionSuggestions" placeholder="Ex. Fotboll" autocomplete="off">
    </div>
    <div class="inline-2">
      <div class="form-group">
        <label class="form-label">Första dag</label>
        <input type="date" id="editStart">
      </div>
      <div class="form-group">
        <label class="form-label">Sista dag</label>
        <input type="date" id="editEnd">
      </div>
    </div>
    <div id="editEventMsg" style="display:none;font-size:13px;padding:.5rem .75rem;border-radius:8px;margin-bottom:.5rem;background:#fdecea;color:#c0392b"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEdit()">Avbryt</button>
      <button class="btn btn-primary" id="editSaveBtn" onclick="saveEventEdit()">Spara →</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://acqwpmigracdzkjrddwk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjcXdwbWlncmFjZHpranJkZHdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4OTc1MTUsImV4cCI6MjA5NjQ3MzUxNX0.xx4t5mUkHNJanGdhy7HKSdolkYZKP6cCHQM72ktmrac';
const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const _clubParam = new URLSearchParams(window.location.search).get('club');
let CLUB_ID = _clubParam || null;
let _allEvents = [];
let _activeFilter = null;

async function sb(path, opts){
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, Object.assign({
    headers: { 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY, 'Content-Type':'application/json', 'Prefer':'return=representation' }
  }, opts||{}));
  if(!res.ok) throw new Error(await res.text());
  return res.status === 204 ? null : res.json();
}

function fmtRange(start, end){
  if(!start) return '';
  const months = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
  const s = new Date(start);
  if(!end || end === start) return s.getDate() + ' ' + months[s.getMonth()] + ' ' + s.getFullYear();
  const e = new Date(end);
  if(s.getMonth() === e.getMonth()) return s.getDate() + '–' + e.getDate() + ' ' + months[s.getMonth()] + ' ' + s.getFullYear();
  return s.getDate() + ' ' + months[s.getMonth()] + '–' + e.getDate() + ' ' + months[e.getMonth()] + ' ' + s.getFullYear();
}

// ── Sektioner ────────────────────────────────────────────
async function loadSections(){
  if(!CLUB_ID) return;
  try {
    const rows = await sb('sections?club_id=eq.' + CLUB_ID + '&order=name.asc&select=id,name');
    const wrap = document.getElementById('sectionPills');
    if(!wrap) return;
    if(!rows.length){
      wrap.innerHTML = '<span style="font-size:13px;color:var(--muted);font-style:italic">Inga sektioner ännu.</span>';
    } else {
      wrap.innerHTML = rows.map(r =>
        '<span class="sec-pill">' + r.name +
        ' <button onclick="deleteSection(\'' + r.id + '\')" title="Ta bort">×</button></span>'
      ).join('');
    }
    // Uppdatera datalist
    const dl = document.getElementById('sectionSuggestions');
    if(dl) dl.innerHTML = rows.map(r => '<option value="' + r.name + '">').join('');
    // Uppdatera filterrad
    renderFilterRow(rows);
  } catch(e){ console.error('loadSections:', e); }
}

function renderFilterRow(sections){
  const row = document.getElementById('filterRow');
  if(!row) return;
  if(sections.length < 2 || !_allEvents.length){ row.style.display = 'none'; return; }
  row.style.display = 'flex';
  row.innerHTML = '<button class="sf-btn' + (!_activeFilter ? ' active' : '') + '" onclick="filterSection(null,this)">Alla</button>' +
    sections.map(s => '<button class="sf-btn' + (_activeFilter === s.name ? ' active' : '') + '" onclick="filterSection(\'' + s.name.replace(/'/g, "\\'") + '\',this)">' + s.name + '</button>').join('');
}

function filterSection(section, btn){
  _activeFilter = section;
  document.querySelectorAll('.sf-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.querySelectorAll('.event-card-wrap').forEach(wrap => {
    wrap.style.display = (!section || wrap.dataset.section === section) ? '' : 'none';
  });
}

async function addSection(){
  const input = document.getElementById('sectionInput');
  const name = input ? input.value.trim() : '';
  if(!name || !CLUB_ID) return;
  try {
    const existing = await sb('sections?club_id=eq.' + CLUB_ID + '&name=eq.' + encodeURIComponent(name) + '&select=id');
    if(existing && existing.length){ input.value = ''; return; }
    await fetch(SUPABASE_URL + '/rest/v1/sections', {
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body: JSON.stringify([{ club_id: CLUB_ID, name }])
    });
    input.value = '';
    await loadSections();
  } catch(e){ console.error('addSection:', e); }
}

async function deleteSection(id){
  try {
    await fetch(SUPABASE_URL + '/rest/v1/sections?id=eq.' + id, {
      method:'DELETE',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    await loadSections();
  } catch(e){ console.error('deleteSection:', e); }
}

// ── Events ────────────────────────────────────────────────
async function load(){
  try {
    if(!CLUB_ID){
      const { data:{ session } } = await sbClient.auth.getSession();
      if(session){
        const r = await fetch(SUPABASE_URL + '/rest/v1/club_users?user_id=eq.' + session.user.id + '&select=club_id&limit=1', {
          headers:{ 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY }
        });
        const rows = await r.json().catch(()=>[]);
        if(rows.length && rows[0].club_id) CLUB_ID = rows[0].club_id;
      }
    }
    if(CLUB_ID){
      const clubs = await sb('clubs?id=eq.' + CLUB_ID + '&select=name');
      if(clubs.length) document.getElementById('clubName').textContent = clubs[0].name;
    }
    const events = CLUB_ID ? await sb('events?club_id=eq.' + CLUB_ID + '&order=date_start.desc&select=*') : [];
    _allEvents = events || [];
    await loadSections();
    await renderEvents(_allEvents);
  } catch(e){
    console.error(e);
    document.getElementById('eventList').innerHTML = '<div class="loading">Kunde inte ladda. Försök igen.</div>';
  }
}

async function renderEvents(events){
  const list = document.getElementById('eventList');
  if(!events || !events.length){
    list.innerHTML = '<p class="empty-msg">Inga arrangemang ännu. Klicka "+ Nytt arrangemang" för att komma igång.</p>';
    return;
  }
  let cards = '';
  for(const ev of events){
    let shiftCount = 0, partCount = 0;
    try {
      const shifts = await sb('shifts?event_id=eq.' + ev.id + '&select=id');
      shiftCount = shifts.length;
      const parts = await sb('participants?event_id=eq.' + ev.id + '&select=id');
      partCount = parts.length;
    } catch(e){}
    const section = ev.section || '';
    const safeData = JSON.stringify({ id:ev.id, name:ev.name||'', section:ev.section||'', start:ev.date_start||'', end:ev.date_end||'' }).replace(/'/g,'&#39;');
    cards += '<div class="event-card-wrap" data-section="' + section + '">' +
      '<a class="event-card" href="admin.html?event=' + ev.id + '">' +
      (section ? '<span class="tag">' + section + '</span>' : '') +
      '<h3>' + (ev.name || 'Namnlöst arrangemang') + '</h3>' +
      '<div class="date">' + fmtRange(ev.date_start, ev.date_end) + '</div>' +
      '<div class="stats"><span><strong>' + shiftCount + '</strong> pass</span><span><strong>' + partCount + '</strong> deltagare</span></div>' +
      '</a>' +
      '<button class="edit-event-btn" onclick="editEventFromData(this)" data-ev=\'' + safeData + '\'>✏️</button>' +
      '</div>';
  }
  list.innerHTML = '<div class="event-grid">' + cards + '</div>';
}

// ── Nytt arrangemang ──────────────────────────────────────
function openNew(){ document.getElementById('modalNew').classList.add('open'); }
function closeNew(){
  document.getElementById('modalNew').classList.remove('open');
  document.getElementById('createMsg').style.display = 'none';
  document.getElementById('createBtn').disabled = false;
  document.getElementById('createBtn').textContent = 'Skapa →';
}

async function submitNewEvent(){
  const name = document.getElementById('newName').value.trim();
  const section = document.getElementById('newSection').value;
  const start = document.getElementById('newStart').value;
  const end = document.getElementById('newEnd').value;
  const msg = document.getElementById('createMsg');
  const btn = document.getElementById('createBtn');
  msg.style.display = 'none';
  if(!name || !start){ msg.textContent = 'Fyll i namn och första dag.'; msg.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Skapar...';
  try {
    const row = { name, section, date_start: start, date_end: end || start };
    if(CLUB_ID) row.club_id = CLUB_ID;
    await sb('events', { method:'POST', body: JSON.stringify(row) });
    closeNew();
    document.getElementById('newName').value = '';
    document.getElementById('newSection').value = '';
    document.getElementById('newStart').value = '';
    document.getElementById('newEnd').value = '';
    await load();
  } catch(e){
    msg.textContent = 'Kunde inte skapa: ' + (e.message || 'okänt fel');
    msg.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Skapa →';
  }
}

// ── Redigera arrangemang ──────────────────────────────────
function editEventFromData(btn){
  try {
    const d = JSON.parse(btn.getAttribute('data-ev'));
    document.getElementById('editId').value = d.id;
    document.getElementById('editName').value = d.name;
    document.getElementById('editSection').value = d.section;
    document.getElementById('editStart').value = d.start;
    document.getElementById('editEnd').value = d.end;
    document.getElementById('editEventMsg').style.display = 'none';
    document.getElementById('editSaveBtn').disabled = false;
    document.getElementById('editSaveBtn').textContent = 'Spara →';
    document.getElementById('modalEdit').classList.add('open');
  } catch(e){ console.error(e); }
}
function closeEdit(){ document.getElementById('modalEdit').classList.remove('open'); }

async function saveEventEdit(){
  const id = document.getElementById('editId').value;
  const name = document.getElementById('editName').value.trim();
  const section = document.getElementById('editSection').value;
  const start = document.getElementById('editStart').value;
  const end = document.getElementById('editEnd').value;
  const msg = document.getElementById('editEventMsg');
  const btn = document.getElementById('editSaveBtn');
  if(!name || !start){ msg.style.display='block'; msg.textContent='Namn och startdatum krävs.'; return; }
  btn.disabled=true; btn.textContent='Sparar...';
  try {
    await sb('events?id=eq.' + id, { method:'PATCH', body: JSON.stringify({ name, section, date_start: start, date_end: end || start }) });
    closeEdit();
    await load();
  } catch(e){
    msg.style.display='block'; msg.textContent='Kunde inte spara: ' + (e.message||'okänt fel');
    btn.disabled=false; btn.textContent='Spara →';
  }
}

// ── Auth ──────────────────────────────────────────────────
async function signOut(){
  await sbClient.auth.signOut();
  window.location.href = 'login.html';
}

(async function(){
  const { data:{ session } } = await sbClient.auth.getSession();
  if(!session){ window.location.href = 'login.html'; return; }
  load();
})();
</script>

<script>
// ── Ny version-banner ─────────────────────────────────────
(function(){
  let _initialTag = null;
  async function checkVersion(){
    try {
      const res = await fetch(location.pathname + '?_=' + Date.now(), { method:'HEAD', cache:'no-store' });
      const tag = res.headers.get('ETag') || res.headers.get('Last-Modified');
      if(!tag) return;
      if(!_initialTag){ _initialTag = tag; return; }
      if(tag !== _initialTag) showUpdateBanner();
    } catch(e){}
  }
  function showUpdateBanner(){
    if(document.getElementById('lpUpdateBanner')) return;
    const b = document.createElement('div');
    b.id = 'lpUpdateBanner';
    b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#1a8c3a;color:#fff;text-align:center;padding:10px 1rem;font-size:14px;font-weight:600;cursor:pointer;font-family:"Outfit",sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.2)';
    b.innerHTML = '🔄 En uppdatering av LagPasset finns tillgänglig. <u>Klicka här för att ladda om.</u>';
    b.onclick = () => location.reload();
    document.body.prepend(b);
  }
  checkVersion();
  setInterval(checkVersion, 5 * 60 * 1000);
})();
</script>
